<style>
    /* CSS Variables for colors */
    :root {
      --bg-body: #ffffff;
      --bg-footer: #0f172a;
      --bg-output: #020617;

      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-light: #cbd5e1;
      --text-white: #ffffff;

      --border-light: #e2e8f0;
      --border-dark: #1e293b;

      --emerald-500: #53a597;
      --emerald-600: #478d82;
      --emerald-100: #d1fae5;

      --blue-500: #4d6fbe;
      --blue-600: #4260a4;

      --orange-500: #ff6362;
      --orange-600: #ec5959;
      --orange-100: #fee2e2;

      --indigo-500: #58508d;
      --indigo-600: #494375;

      --red-400: #f87171;
    }

    /* Base Reset & Plugin Dimensions */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      width: 500px;
      height: 600px;
      overflow: hidden; /* Prevent scrolling */
      background-color: var(--bg-body);
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Helvetica Neue",
        Arial,
        sans-serif;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Main Layout - tighter padding to prevent overflow */
    .main-content {
      flex: 1;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between; 
    }

    .step-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Steps Typography & Layout */
    .step-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .step-number {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      color: var(--text-white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .step-number.emerald {
      background-color: var(--emerald-500);
    }
    .step-number.blue {
      background-color: var(--blue-500);
    }
    .step-number.orange {
      background-color: var(--orange-500);
    }
    .step-number.indigo {
      background-color: var(--indigo-500);
    }

    .step-title {
      font-weight: 600;
      font-size: 15px;
      margin: 0;
      color: var(--text-main);
    }

    .info-btn {
      background: transparent;
      border: none;
      padding: 4px;
      border-radius: 50%;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, color 0.2s;
    }

    .info-btn:hover {
      background-color: var(--border-light);
      color: var(--text-main);
    }

    /* Radio Buttons */
    .radio-group {
      display: flex;
      gap: 12px;
    }

    .radio-label {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background-color: #f8fafc;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .radio-label.emerald-theme:hover {
      border-color: var(--emerald-500);
      background-color: var(--emerald-100);
    }
    .radio-label.orange-theme:hover {
      border-color: var(--orange-500);
      background-color: var(--orange-100);
    }

    .radio-input {
      width: 14px;
      height: 14px;
      cursor: pointer;
      margin: 0;
    }
    .radio-input.emerald-theme { accent-color: var(--emerald-500); }
    .radio-input.orange-theme { accent-color: var(--orange-500); }

    .radio-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 40px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-white);
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn svg {
      width: 16px;
      height: 16px;
      margin-right: 8px;
    }

    .btn-emerald {
      background-color: var(--emerald-500);
    }
    .btn-emerald:hover {
      background-color: var(--emerald-600);
    }

    .btn-blue {
      background-color: var(--blue-500);
    }
    .btn-blue:hover {
      background-color: var(--blue-600);
    }

    .btn-orange {
      background-color: var(--orange-500);
    }
    .btn-orange:hover {
      background-color: var(--orange-600);
    }

    .btn-indigo {
      background-color: var(--indigo-500);
    }
    .btn-indigo:hover {
      background-color: var(--indigo-600);
    }

    /* Footer Feedback Area */
    .footer {
      background-color: var(--bg-footer);
      padding: 12px 24px;
      height: 110px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .footer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .footer-title {
      font-weight: 600;
      font-size: 11px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0;
    }

    .footer-title svg {
      width: 12px;
      height: 12px;
    }

    .btn-icon-clear {
      background: transparent;
      border: none;
      padding: 4px;
      border-radius: 4px;
      color: #94a3b8;
      cursor: pointer;
      transition: color 0.2s, background-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon-clear:hover:not(:disabled) {
      color: var(--red-400);
      background-color: var(--border-dark);
    }

    .btn-icon-clear:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-icon-clear svg {
      width: 14px;
      height: 14px;
    }

    .output-box {
      background-color: var(--bg-output);
      border-radius: 6px;
      border: 1px solid var(--border-dark);
      padding: 8px 10px;
      flex: 1;
      overflow-y: auto;
    }

    pre {
      font-size: 11px;
      color: var(--text-light);
      font-family: monospace;
      white-space: pre-wrap;
      line-height: 1.5;
      margin: 0;
    }

    .empty-state {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      font-size: 12px;
      font-style: italic;
      margin: 0;
    }

    .hidden {
      display: none !important;
    }

    /* Modal Styling */
    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(2px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.2s ease;
    }

    .modal-backdrop.hidden {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .modal-box {
      background: var(--bg-body);
      width: 400px;
      border-radius: 8px;
      box-shadow:
        0 20px 25px -5px rgba(0, 0, 0, 0.1),
        0 10px 10px -5px rgba(0, 0, 0, 0.04);
      overflow: hidden;
      transform: scale(1);
      transition: transform 0.2s ease;
    }

    .modal-backdrop.hidden .modal-box {
      transform: scale(0.95);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
      color: var(--text-main);
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
    }

    .modal-close:hover {
      background: var(--border-light);
      color: var(--text-main);
    }

    .modal-body {
      padding: 20px;
      font-size: 15px;
      line-height: 1.6;
      color: #334155;
    }

    .modal-body code {
      background-color: #f1f5f9;
      padding: 3px 6px;
      border-radius: 4px;
      color: var(--blue-600);
      font-family: monospace;
      font-size: 14px;
      border: 1px solid var(--border-light);
    }

    /* Toast Notifications */
    .toast-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px;
      pointer-events: none;
    }

    .toast {
      padding: 10px 16px;
      border-radius: 6px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-white);
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 90%;
      text-align: left;
      line-height: 1.4;
    }

    .toast-success {
      background-color: var(--border-dark);
      border-left: 4px solid var(--emerald-400);
    }
    .toast-info {
      background-color: #334155;
    }

    .toast-icon {
      width: 18px;
      height: 18px;
      color: var(--emerald-400);
      flex-shrink: 0;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    @keyframes fadeOut {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }

    .toast-enter {
      animation: slideDown 0.3s ease-out forwards;
    }
    .toast-exit {
      animation: fadeOut 0.3s ease-out forwards;
    }
  </style>
</head>
<body>
  <!-- Modal for Helper Texts -->
  <div id="info-modal" class="modal-backdrop hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title" class="modal-title">Help Info</h3>
        <button id="modal-close" class="modal-close">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>
      <div id="modal-body" class="modal-body">
        <!-- Content injected dynamically -->
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Hidden elements for plugin logic -->
  <textarea
    id="copy"
    style="position: fixed; opacity: 0; pointer-events: none"
  ></textarea>
  <div id="sign" class="hidden"></div>

  <!-- Main Content Area -->
  <div class="main-content">
    <!-- Step 1: Create Variable Form -->
    <form id="createVariables" class="step-section">
      <div class="step-header">
        <div class="step-number emerald">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 6 9 17l-5-5" />
          </svg>
        </div>
        <h2 class="step-title">Create variable from text layer</h2>
        <button
          type="button"
          class="info-btn"
          onclick="openModal('step1')"
          title="Show Help"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 16v-4" />
            <path d="M12 8h.01" />
          </svg>
        </button>
      </div>

      <div class="radio-group">
        <label for="en" class="radio-label emerald-theme">
          <input
            type="radio"
            id="en"
            name="language"
            value="en"
            checked
            class="radio-input emerald-theme"
          />
          <span class="radio-text">English</span>
        </label>
        <label for="ja" class="radio-label emerald-theme">
          <input
            type="radio"
            id="ja"
            name="language"
            value="ja"
            class="radio-input emerald-theme"
          />
          <span class="radio-text">日本語</span>
        </label>
      </div>

      <button type="submit" class="btn btn-emerald">
        Create (C)
      </button>
    </form>

    <!-- Step 2: Generate i18n -->
    <div class="step-section">
      <div class="step-header">
        <div class="step-number blue">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
            <path d="M2 12h20" />
          </svg>
        </div>
        <h2 class="step-title">Copy code from variables table</h2>
        <button
          type="button"
          class="info-btn"
          onclick="openModal('step2')"
          title="Show Help"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 16v-4" />
            <path d="M12 8h.01" />
          </svg>
        </button>
      </div>
      <button
        type="button"
        id="generateTranslationVariables"
        class="btn btn-blue"
      >
        To translations.tsx (A)
      </button>
    </div>

    <!-- Step 3: Create Component Code -->
    <div class="step-section">
      <div class="step-header">
        <div class="step-number orange">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M10 12.5 8 15l2 2.5" />
            <path d="m14 12.5 2 2.5-2 2.5" />
            <path d="M14 2v4a2 2 0 0 0 2 2h4" />
            <path
              d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"
            />
          </svg>
        </div>
        <h2 class="step-title">Create React code for this text</h2>
        <button
          type="button"
          class="info-btn"
          onclick="openModal('step3')"
          title="Show Help"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 16v-4" />
            <path d="M12 8h.01" />
          </svg>
        </button>
      </div>
      
      <div class="radio-group">
        <label for="var-user" class="radio-label orange-theme">
          <input
            type="radio"
            id="var-user"
            name="codeVariableType"
            value="native"
            checked
            class="radio-input orange-theme"
          />
          <span class="radio-text">React Native</span>
        </label>
        <label for="var-lang" class="radio-label orange-theme">
          <input
            type="radio"
            id="var-lang"
            name="codeVariableType"
            value="react"
            class="radio-input orange-theme"
          />
          <span class="radio-text">React</span>
        </label>
      </div>

      <button type="button" id="createCode" class="btn btn-orange">
        To your component file (E)
      </button>
    </div>

    <!-- Step 4: Rename Layers -->
    <div class="step-section">
      <div class="step-header">
        <div class="step-number indigo">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"
            />
            <path
              d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"
            />
          </svg>
        </div>
        <h2 class="step-title">Update text layer name with variable name</h2>
        <button
          type="button"
          class="info-btn"
          onclick="openModal('step4')"
          title="Show Help"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 16v-4" />
            <path d="M12 8h.01" />
          </svg>
        </button>
      </div>
      <button
        type="button"
        id="renameLayersToVariableName"
        class="btn btn-indigo"
      >
        Rename layer (R)
      </button>
    </div>
  </div>

  <!-- Footer Feedback Area -->
  <div class="footer">
    <div class="footer-header">
      <h3 class="footer-title">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
          />
        </svg>
        Result Output
      </h3>
      <button
        type="button"
        id="btn-clear"
        class="btn-icon-clear"
        disabled
        title="Clear Result"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"
          />
          <path d="M22 21H7" />
          <path d="m5 11 9 9" />
        </svg>
      </button>
    </div>
    <div class="output-box">
      <pre id="code" class="hidden"></pre>
      <div id="empty-state" class="empty-state">Ready. Run a step above.</div>
    </div>
  </div>

  <script>
    // System Elements mapped to your IDs
    const codebox = document.getElementById("code");
    const sign = document.getElementById("sign");
    const copyInput = document.getElementById("copy");

    // UI Elements
    const emptyState = document.getElementById("empty-state");
    const btnClear = document.getElementById("btn-clear");
    const toastContainer = document.getElementById("toast-container");
    const modal = document.getElementById("info-modal");
    const modalTitle = document.getElementById("modal-title");
    const modalBody = document.getElementById("modal-body");
    const modalClose = document.getElementById("modal-close");

    // Global variable to keep track of what action was performed
    let lastAction = "";

    // Helper Content Data
    const helpData = {
      step1: {
        title: "Create Variable from Text",
        body: "<strong>Parameter Syntax:</strong><br/>Wrap params in <code>[[ ]]</code> (e.g. <code>Hi [[name]]</code>)<br/><br/><strong>Result would be:</strong><br/><code>(name:string) =&gt; \`Hi ${name}\`</code>",
      },
      step2: {
        title: "Generate Translation Code",
        body: "Converts variables into dictionary objects (<code>i18n_en</code>, <code>i18n_ja</code>). You need to paste that into your <code>translations.tsx</code> file.",
      },
      step3: {
        title: "Create Component React Code",
        body: "Creates something similar to <code>translationCommon[language].variablename</code>, so that you can paste in the actual <code>.tsx</code> file without manually finding the translation variable. For paragraphs, it would automatically append <code>p${n}</code> for each line.",
      },
      step4: {
        title: "Update Layer Names",
        body: "<strong>Important:</strong> Rename linked layers to match variables (starts with <code>#</code>). This is required for linking Figma variables properly.",
      },
    };

    // Modal Functions
    function openModal(stepId) {
      modalTitle.innerHTML = helpData[stepId].title;
      modalBody.innerHTML = helpData[stepId].body;
      modal.classList.remove("hidden");
    }

    modalClose.onclick = () => modal.classList.add("hidden");
    modal.onclick = (e) => {
      if (e.target === modal) modal.classList.add("hidden");
    };

    // Custom Toast Notification
    function showToast(message, type = "success") {
      const toast = document.createElement("div");
      const bgClass = type === "success" ? "toast-success" : "toast-info";
      toast.className = `toast toast-enter ${bgClass}`;

      if (type === "success") {
        toast.innerHTML =
          '<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg><span>' +
          message +
          "</span>";
      } else {
        toast.textContent = message;
      }

      toastContainer.appendChild(toast);

      const duration = message.length > 50 ? 4000 : 2500;
      setTimeout(() => {
        toast.classList.remove("toast-enter");
        toast.classList.add("toast-exit");
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }

    // --- YOUR FIGMA PLUGIN LOGIC INTEGRATED HERE ---

    document.addEventListener("keydown", (e) => {
      const cmd = e.metaKey || e.ctrlKey;
      if (e.key === "a") {
        e.preventDefault();
        generateTranslationVariables();
      } else if (e.key.toLowerCase() === "e") {
        e.preventDefault();
        createCode();
      } else if ( e.key.toLowerCase() === "r") {
        e.preventDefault();
        renameLayersToVariableName();
      } else if (e.key.toLowerCase() === "c") {
        e.preventDefault();
        createVariables();
      }
    });

    document.getElementById("generateTranslationVariables").onclick = () => {
      generateTranslationVariables();
    };
    function generateTranslationVariables() {
      lastAction = "generate";
      parent.postMessage(
        { pluginMessage: { type: "generateTranslationVariables" } },
        "*",
      );
    }

    document.getElementById("renameLayersToVariableName").onclick = () => {
      renameLayersToVariableName();
    };
    function renameLayersToVariableName() {
      lastAction = "rename";
      parent.postMessage(
        { pluginMessage: { type: "renameLayersToVariableName" } },
        "*",
      );
    }

    document.getElementById("createCode").onclick = () => {
      createCode();
    };
    function createCode() {
      lastAction = "create";
      // Read the newly added radio group state for the format type
      const codeFormatType = document.querySelector('input[name="codeVariableType"]:checked').value;
      parent.postMessage(
        { 
          pluginMessage: { 
            type: "createCode", 
            formatType: codeFormatType 
          } 
        }, 
        "*"
      );
    }

    document.getElementById("createVariables").onsubmit = (el) => {
      el.preventDefault();
      createVariables();
    };
    function createVariables() {
      lastAction = "add";

      const selectedLanguage = document.querySelector(
        'input[name="language"]:checked',
      ).value;
      parent.postMessage(
        {
          pluginMessage: {
            type: "createVariables",
            language: selectedLanguage,
          },
        },
        "*",
      );
    }

    onmessage = (event) => {
      const reactStr = event.data.pluginMessage;

      // Update UI Panel Display
      if (reactStr) {
        codebox.innerText = reactStr;
        codebox.classList.remove("hidden");
        emptyState.classList.add("hidden");
        btnClear.disabled = false;

        // Execute Copy using your logic
        copyInput.value = reactStr;
        copyInput.select();
        document.execCommand("copy");

        // Determine the success message based on the button clicked
        let successMessage = "Action completed!";
        if (lastAction === "add") {
          successMessage = "Successfully added to your variable table.";
        } else if (lastAction === "generate") {
          successMessage =
            "All the variables are converted to your React code, you can paste it to the translations file now.";
        } else if (lastAction === "create") {
          successMessage = "The variable has been converted to React code.";
        } else if (lastAction === "rename") {
          successMessage =
            "The layer has been renamed to match the variable name.";
        }

        showToast(successMessage);
      }
    };

    // Keep Clear button functional for UI
    btnClear.onclick = () => {
      codebox.innerText = "";
      codebox.classList.add("hidden");
      emptyState.classList.remove("hidden");
      btnClear.disabled = true;
      showToast("Result cleared", "info");
    };
  </script>
</body>
